version: '2.1'

orbs:
  aws-cli: circleci/aws-cli@5.4

jobs:
  oidc-smoke-test:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - aws-cli/setup:
          role_arn: ${AWS_ROLE_ARN}
          region: sa-east-1
          profile_name: oidc-dev
          role_session_name: circleci-oidc-smoke
          session_duration: "900"
      - run:
          name: "Check 1 — assumed identity (OIDC + trust policy)"
          command: |
            aws sts get-caller-identity --profile oidc-dev
      - run:
          name: "Check 2 — state bucket access (scoped S3 allow)"
          command: |
            aws s3 ls s3://175209828699-sa-east-1-terraform-remote-state/ --profile oidc-dev
      - run:
          name: "Check 3 — EC2 read (infra service scope)"
          command: |
            aws ec2 describe-vpcs --max-items 1 --region sa-east-1 --profile oidc-dev > /dev/null
            echo "ec2:DescribeVpcs OK"

workflows:
  smoke:
    jobs:
      - oidc-smoke-test:
          context: aws-dev
